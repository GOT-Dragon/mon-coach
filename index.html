function MiniChart({ entries, color, objectif }) {
  if (entries.length < 2) return null;
  const weights = entries.map(e => e.weight);
  const seuils = [90, 85];
  const minW = Math.min(...weights, objectif, ...seuils) - 1;
  const maxW = Math.max(...weights) + 2;
  const W = 300, H = 110;
  const toY = w => H - ((w - minW) / (maxW - minW)) * H;
  const pts  = weights.map((w, i) => ({ x: (i / (weights.length - 1)) * W, y: toY(w) }));
  const path = pts.map((p, i) => `${i === 0 ? "M" : "L"}${p.x},${p.y}`).join(" ");
  const goalY  = toY(objectif);
  const y90    = toY(90);
  const y85    = toY(85);
  return (
    <div style={{ background: "#ffffff0a", borderRadius: 12, padding: "12px 16px" }}>
      <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{ display: "block", overflow: "visible" }}>
        {/* Ligne objectif 80 kg */}
        <line x1={0} y1={goalY} x2={W} y2={goalY} stroke="#22c55e" strokeWidth={1} strokeDasharray="4,3" opacity={0.6} />
        <text x={W - 2} y={goalY - 3} fill="#22c55e" fontSize="8" textAnchor="end" opacity={0.8}>{objectif} kg</text>
        {/* Seuil 85 kg */}
        <line x1={0} y1={y85} x2={W} y2={y85} stroke="#3b82f6" strokeWidth={1} strokeDasharray="3,3" opacity={0.6} />
        <text x={W - 2} y={y85 - 3} fill="#3b82f6" fontSize="8" textAnchor="end" opacity={0.8}>85 kg</text>
        {/* Seuil 90 kg */}
        <line x1={0} y1={y90} x2={W} y2={y90} stroke="#f97316" strokeWidth={1} strokeDasharray="3,3" opacity={0.6} />
        <text x={W - 2} y={y90 - 3} fill="#f97316" fontSize="8" textAnchor="end" opacity={0.8}>90 kg</text>
        {/* Courbe de poids */}
        <path d={path} fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />
        {/* Points avec étiquettes de poids */}
        {pts.map((p, i) => (
          <g key={i}>
            <circle cx={p.x} cy={p.y} r={4} fill={color} />
            <text
              x={p.x}
              y={p.y - 8}
              fill={color}
              fontSize="8"
              textAnchor="middle"
              fontWeight="700"
            >{weights[i]}</text>
          </g>
        ))}
      </svg>
      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 10, color: "#475569", marginTop: 4 }}>
        <span>{entries[0]?.date}</span><span>{entries[entries.length - 1]?.date}</span>
      </div>
      {/* Légende */}
      <div style={{ display: "flex", gap: 12, marginTop: 8, flexWrap: "wrap" }}>
        <span style={{ fontSize: 10, color: "#f97316" }}>— 90 kg</span>
        <span style={{ fontSize: 10, color: "#3b82f6" }}>— 85 kg</span>
        <span style={{ fontSize: 10, color: "#22c55e" }}>— {objectif} kg (objectif)</span>
      </div>
    </div>
  );
}

// ── FOCUS TAB ─────────────────────────────────────────────────────────────────
function FocusTab({ data, update, color }) {
  const [input, setInput]       = useState("");
  const [priority, setPriority] = useState("haute");
  const [mIdx, setMIdx]         = useState(0);

  const addTask = () => {
    if (!input.trim()) return;
    update(d => ({ ...d, tasks: [{ id: Date.now(), text: input.trim(), priority, done: false, created: today() }, ...d.tasks] }));
    setInput("");
  };
  const toggleTask = id => update(d => {
    const tasks   = d.tasks.map(t => t.id === id ? { ...t, done: !t.done } : t);
    const allDone = tasks.length > 0 && tasks.every(t => t.done);
    const isNew   = d.lastDate !== today();
    return { ...d, tasks, streak: allDone && isNew ? d.streak + 1 : d.streak, lastDate: today() };
  });
  const del = id => update(d => ({ ...d, tasks: d.tasks.filter(t => t.id !== id) }));

  const pending  = data.tasks.filter(t => !t.done);
  const done     = data.tasks.filter(t => t.done);
  const progress = data.tasks.length > 0 ? Math.round((done.length / data.tasks.length) * 100) : 0;
  const pc = { haute: "#ef4444", normale: color, basse: "#94a3b8" };
  const pl = { haute: "🔴 Haute", normale: "🟠 Normale", basse: "⚪ Basse" };

  return (
    <div>
      <CardBox color={color} title="Mon objectif">
        {data.weeklyGoal}
        {data.weekBilan && <div style={{ fontSize: 12, color: "#94a3b8", marginTop: 6, fontWeight: 400, fontStyle: "italic" }}>💬 {data.weekBilan}</div>}
      </CardBox>

      <StatBar color={color} streak={data.streak} label="jours de listes complètes"
        extra={`${done.length}/${data.tasks.length} tâches — méthode 1-3-1`} progress={progress} />

      <div onClick={() => setMIdx(i => (i + 1) % data.mantras.length)}
        style={{ background: "#ffffff06", borderRadius: 12, padding: "12px 16px", marginBottom: 14, borderLeft: `3px solid ${color}`, cursor: "pointer", fontSize: 13, color: "#cbd5e1", fontStyle: "italic" }}>
        ✨ {data.mantras[mIdx]} <span style={{ color: "#475569", fontSize: 11 }}>— clic pour changer</span>
      </div>

      <SectionBox color={color}>
        <Lbl>Ajouter une tâche</Lbl>
        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
            <input value={input} onChange={e => setInput(e.target.value)}
              onKeyDown={e => e.key === "Enter" && addTask()}
              placeholder="Quelle est ta priorité du jour ?" style={inp(color)} />
            <select value={priority} onChange={e => setPriority(e.target.value)}
              style={{ ...inp(color), maxWidth: 140, flex: "none" }}>
              <option value="haute">🔴 Haute</option>
              <option value="normale">🟠 Normale</option>
              <option value="basse">⚪ Basse</option>
            </select>
          </div>
          <button onClick={addTask} style={{ ...btn(color), width: "100%" }}>+ Ajouter</button>
        </div>
      </SectionBox>

      {data.tasks.length === 0 && <Empty emoji="✅" text="Ajoute ta première priorité du jour !" />}
      <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
        {[...pending, ...done].map(t => (
          <div key={t.id} style={{
            display: "flex", alignItems: "flex-start", gap: 10, padding: "12px 14px",
            background: t.done ? "#ffffff05" : "#ffffff0d", borderRadius: 12,
            border: `1px solid ${t.done ? "#ffffff11" : pc[t.priority] + "44"}`,
            opacity: t.done ? 0.55 : 1,
          }}>
            <button onClick={() => toggleTask(t.id)} style={{
              width: 24, height: 24, borderRadius: 50, border: `2px solid ${pc[t.priority]}`,
              background: t.done ? pc[t.priority] : "transparent",
              cursor: "pointer", flexShrink: 0, fontSize: 11, marginTop: 2,
              display: "flex", alignItems: "center", justifyContent: "center",
            }}>{t.done ? "✓" : ""}</button>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 14, textDecoration: t.done ? "line-through" : "none", color: t.done ? "#64748b" : "#e2e8f0" }}>{t.text}</div>
              <div style={{ fontSize: 10, color: pc[t.priority], fontWeight: 700, marginTop: 3 }}>{pl[t.priority]}</div>
            </div>
            <button onClick={() => del(t.id)} style={{ background: "none", border: "none", color: "#475569", cursor: "pointer", fontSize: 18, lineHeight: 1 }}>×</button>
          </div>
        ))}
      </div>
    </div>
  );
}

function AnglaisTab({ data, update, color }) {
  const [sType, setSType]   = useState("ecoute");
  const [dur, setDur]       = useState(20);
  const [word, setWord]     = useState("");
  const [wordFr, setWordFr] = useState("");
  const [phrase, setPhrase] = useState("");
  const [sIdx, setSIdx]     = useState(0);
  const [view, setView]     = useState("apprendre");

  const logSession = () => {
    const s = { id: Date.now(), type: sType, duration: Number(dur), date: today() };
    const isNew = data.lastDate !== today();
    update(d => ({ ...d, sessions: [s, ...d.sessions], streak: isNew ? d.streak + 1 : d.streak, lastDate: today() }));
  };
  const addVocab = () => {
    if (!word.trim()) return;
    update(d => ({ ...d, vocab: [{ id: Date.now(), word: word.trim(), fr: wordFr.trim(), phrase: phrase.trim(), mastered: false, date: today() }, ...d.vocab] }));
    setWord(""); setWordFr(""); setPhrase("");
  };
  const toggleM = id => update(d => ({ ...d, vocab: d.vocab.map(v => v.id === id ? { ...v, mastered: !v.mastered } : v) }));

  const weekMin   = data.sessions.filter(s => (new Date() - new Date(s.date)) / 86400000 < 7).reduce((s, x) => s + x.duration, 0);
  const mastered  = data.vocab.filter(v => v.mastered).length;
  const icons     = { ecoute: "🎧", lecture: "📖", ecriture: "✍️", conversation: "💬", series: "📺", duolingo: "🦜" };
  const showVocab = view === "apprendre" ? data.vocab.filter(v => !v.mastered) : data.vocab.filter(v => v.mastered);

  return (
    <div>
      <CardBox color={color} title="Roadmap Nov → Fév">
        <div style={{ display: "flex", flexDirection: "column", gap: 5, marginTop: 4 }}>
          {data.monthlyGoals.map((g, i) => (
            <div key={i} style={{ display: "flex", gap: 10, fontSize: 13, fontWeight: 400 }}>
              <span style={{ color, minWidth: 72, fontWeight: 700 }}>{g.month}</span>
              <span style={{ color: "#cbd5e1" }}>{g.goal}</span>
            </div>
          ))}
        </div>
      </CardBox>

      <StatBar color={color} streak={data.streak} label="jours consécutifs de pratique"
        extra={`${weekMin} min cette semaine · ${mastered}/${data.vocab.length} mots`}
        progress={Math.min(100, Math.round((weekMin / 150) * 100))} />

      <div onClick={() => setSIdx(i => (i + 1) % data.proSentences.length)}
        style={{ background: "#ffffff06", borderRadius: 12, padding: "12px 16px", marginBottom: 14, borderLeft: `3px solid ${color}`, cursor: "pointer" }}>
        <div style={{ fontSize: 10, color, letterSpacing: 2, textTransform: "uppercase", marginBottom: 4 }}>💬 Phrase pro du jour</div>
        <div style={{ fontSize: 13, color: "#e2e8f0", fontStyle: "italic" }}>"{data.proSentences[sIdx]}"</div>
        <div style={{ fontSize: 11, color: "#475569", marginTop: 3 }}>Répète à voix haute · clic pour changer</div>
      </div>

      <SectionBox color={color}>
        <Lbl>Logger une session</Lbl>
        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
            <select value={sType} onChange={e => setSType(e.target.value)} style={{ ...inp(color), flex: "none" }}>
              <option value="ecoute">🎧 Écoute</option>
              <option value="lecture">📖 Lecture</option>
              <option value="ecriture">✍️ Écriture</option>
              <option value="conversation">💬 Conversation</option>
              <option value="series">📺 Série VO</option>
              <option value="duolingo">🦜 Duolingo</option>
            </select>
            <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
              <input type="number" value={dur} onChange={e => setDur(e.target.value)} min={5} max={180}
                style={{ ...inp(color), maxWidth: 70, flex: "none" }} />
              <span style={{ color: "#94a3b8", fontSize: 13 }}>min</span>
            </div>
          </div>
          <button onClick={logSession} style={{ ...btn(color), width: "100%" }}>✓ Valider la session</button>
        </div>
      </SectionBox>

      <SectionBox color={color}>
        <Lbl>Nouveau mot</Lbl>
        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
          <div style={{ display: "flex", gap: 8 }}>
            <input value={word} onChange={e => setWord(e.target.value)} placeholder="Mot anglais" style={inp(color)} />
            <input value={wordFr} onChange={e => setWordFr(e.target.value)} placeholder="Traduction" style={inp(color)} />
          </div>
          <input value={phrase} onChange={e => setPhrase(e.target.value)} placeholder="Ta phrase d'exemple..." style={inp(color)} />
          <button onClick={addVocab} style={{ ...btn(color), width: "100%" }}>+ Ajouter le mot</button>
        </div>
      </SectionBox>

      {data.vocab.length > 0 && (
        <div>
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
            <Lbl>{view === "apprendre" ? `${data.vocab.filter(v => !v.mastered).length} mots à apprendre` : `${mastered} mots maîtrisés`}</Lbl>
            <button onClick={() => setView(v => v === "apprendre" ? "maitrise" : "apprendre")} style={{
              background: "#ffffff11", border: "none", borderRadius: 8, padding: "3px 10px",
              color: "#94a3b8", fontSize: 11, cursor: "pointer", fontFamily: "Georgia,serif", marginBottom: 10,
            }}>{view === "apprendre" ? "Voir maîtrisés →" : "← À apprendre"}</button>
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            {showVocab.slice(0, 15).map(v => (
              <div key={v.id} style={{
                padding: "11px 13px", background: v.mastered ? "#ffffff05" : "#ffffff0d",
                borderRadius: 10, border: `1px solid ${v.mastered ? "#ffffff11" : color + "33"}`,
                opacity: v.mastered ? 0.6 : 1,
              }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <button onClick={() => toggleM(v.id)} style={{
                    width: 22, height: 22, borderRadius: 50, border: `2px solid ${color}`,
                    background: v.mastered ? color : "transparent", cursor: "pointer",
                    flexShrink: 0, fontSize: 11, display: "flex", alignItems: "center", justifyContent: "center",
                  }}>{v.mastered ? "✓" : ""}</button>
                  <span style={{ fontWeight: 700, color: v.mastered ? "#64748b" : "#e2e8f0", fontSize: 14 }}>{v.word}</span>
                  {v.fr && <span style={{ color: "#94a3b8", fontSize: 12 }}>→ {v.fr}</span>}
                  <span style={{ marginLeft: "auto", fontSize: 10, color: "#475569" }}>{v.date}</span>
                </div>
                {v.phrase && <div style={{ marginTop: 4, marginLeft: 30, fontSize: 12, color: "#64748b", fontStyle: "italic" }}>"{v.phrase}"</div>}
              </div>
            ))}
          </div>
        </div>
      )}

      {data.sessions.length > 0 && (
        <div style={{ marginTop: 16 }}>
          <Lbl>Sessions récentes</Lbl>
          <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            {data.sessions.slice(0, 6).map(s => (
              <div key={s.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 13px", background: "#ffffff0d", borderRadius: 10 }}>
                <span style={{ fontSize: 16 }}>{icons[s.type]}</span>
                <span style={{ flex: 1, textTransform: "capitalize", fontSize: 12 }}>{s.type}</span>
                <span style={{ color, fontWeight: 700, fontSize: 13 }}>{s.duration} min</span>
                <span style={{ fontSize: 10, color: "#475569" }}>{s.date}</span>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ── DEFI CARD ─────────────────────────────────────────────────────────────────
function DefiCard({ defi, onTenu, onReset, onSetManual, color }) {
  const [editVal, setEditVal] = useState("");
  const [editing, setEditing] = useState(false);

  const isRecord = defi.current >= defi.record;
  const pct = defi.record > 0 ? Math.min(100, Math.round((defi.current / defi.record) * 100)) : 0;

  const saveManual = () => {
    const v = parseInt(editVal);
    if (!isNaN(v) && v >= 0) { onSetManual(v); }
    setEditing(false); setEditVal("");
  };

  return (
    <div style={{ background: "#ffffff0a", borderRadius: 14, padding: 16, marginBottom: 12, border: `1px solid ${color}33` }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
        <div>
          <div style={{ fontSize: 13, fontWeight: 700, color: "#e2e8f0" }}>{defi.emoji} {defi.label}</div>
          <div style={{ fontSize: 10, color: "#94a3b8", marginTop: 2 }}>Record à battre : {defi.record} jours {isRecord ? "🏆" : ""}</div>
        </div>
        <div style={{ textAlign: "center" }}>
          <div style={{ fontSize: 32, fontWeight: 700, color: isRecord ? "#f59e0b" : color, lineHeight: 1 }}>{defi.current}</div>
          <div style={{ fontSize: 9, color: "#94a3b8" }}>jours</div>
        </div>
      </div>

      {/* Barre de progression vs record */}
      <div style={{ background: "#ffffff11", borderRadius: 100, height: 5, overflow: "hidden", marginBottom: 10 }}>
        <div style={{ height: "100%", width: `${pct}%`, background: isRecord ? "#f59e0b" : `linear-gradient(90deg,${color},${color}88)`, borderRadius: 100, transition: "width .5s" }} />
      </div>
      <div style={{ fontSize: 10, color: "#475569", marginBottom: 10 }}>{pct}% du record ({defi.record}j)</div>

      {/* Boutons */}
      <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
        <button onClick={onTenu} style={{
          flex: 1, padding: "9px 8px", background: color, border: "none",
          borderRadius: 10, color: "#fff", fontSize: 12, fontWeight: 700,
          cursor: "pointer", fontFamily: "Georgia,serif",
        }}>✅ J'ai tenu aujourd'hui</button>
        <button onClick={onReset} style={{
          padding: "9px 12px", background: "#ef444422", border: "1px solid #ef444444",
          borderRadius: 10, color: "#ef4444", fontSize: 12,
          cursor: "pointer", fontFamily: "Georgia,serif",
        }}>💥 Reset</button>
        {!editing ? (
          <button onClick={() => setEditing(true)} style={{
            padding: "9px 12px", background: "#ffffff11", border: "1px solid #ffffff22",
            borderRadius: 10, color: "#94a3b8", fontSize: 12,
            cursor: "pointer", fontFamily: "Georgia,serif",
          }}>✏️</button>
        ) : (
          <div style={{ display: "flex", gap: 4 }}>
            <input type="number" value={editVal} onChange={e => setEditVal(e.target.value)}
              placeholder="Jours" min={0}
              style={{ width: 60, padding: "8px 8px", background: "#ffffff0a", border: `1px solid ${color}44`, borderRadius: 8, color: "#e2e8f0", fontSize: 12, fontFamily: "Georgia,serif", outline: "none" }} />
            <button onClick={saveManual} style={{ padding: "8px 10px", background: color, border: "none", borderRadius: 8, color: "#fff", fontSize: 12, cursor: "pointer" }}>OK</button>
            <button onClick={() => setEditing(false)} style={{ padding: "8px 10px", background: "#ffffff11", border: "none", borderRadius: 8, color: "#94a3b8", fontSize: 12, cursor: "pointer" }}>×</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ── POIDS TAB ─────────────────────────────────────────────────────────────────
function PoidsTab({ data, update, color }) {
  const [weight, setWeight] = useState("");
  const [mood, setMood]     = useState(4);
  const [sleep, setSleep]   = useState(7);
  const [energy, setEnergy] = useState(4);
  const [note, setNote]     = useState("");

  const addEntry = () => {
    if (!weight) return;
    const e = { id: Date.now(), weight: Number(weight), mood, sleep, energy, note: note.trim(), date: today() };
    const isNew = data.lastDate !== today();
    update(d => ({ ...d, entries: [e, ...d.entries], streak: isNew ? d.streak + 1 : d.streak, lastDate: today() }));
    setWeight(""); setNote("");
  };

  const updateDefi = (key, fn) => update(d => ({
    ...d, defis: { ...d.defis, [key]: fn(d.defis?.[key] || {}) }
  }));
  const tenu    = key => updateDefi(key, def => {
    const n = (def.current || 0) + 1;
    return { ...def, current: n, record: Math.max(def.record || 0, n) };
  });
  const reset   = key => updateDefi(key, def => ({ ...def, current: 0 }));
  const setManual = (key, val) => updateDefi(key, def => ({
    ...def, current: val, record: Math.max(def.record || 0, val)
  }));
  const defis = data.defis || {};

  const entries   = data.entries || [];
  const latest    = entries[0];
  const prev      = entries[1];
  const diff      = latest && prev ? (latest.weight - prev.weight).toFixed(1) : null;
  const totalLoss = entries.length > 1 ? (entries[entries.length - 1].weight - latest.weight).toFixed(1) : null;
  const toGoal    = latest ? (latest.weight - data.objectif).toFixed(1) : null;
  const moodE     = ["", "😩", "😕", "😐", "😊", "😄"];
  const energyE   = ["", "🪫", "🔋", "⚡", "🔥", "💥"];

  // Tendance basée sur les 3 dernières entrées
  const tendance = (() => {
    if (entries.length < 2) return null;
    const recent = entries.slice(0, Math.min(3, entries.length));
    const delta = recent[0].weight - recent[recent.length - 1].weight;
    if (delta > 0.2) return { label: "↘ En baisse", color: "#22c55e" };
    if (delta < -0.2) return { label: "↗ En hausse", color: "#ef4444" };
    return { label: "→ Stable", color: "#94a3b8" };
  })();

  const [editObjectif, setEditObjectif] = useState(false);
  const [editObjectifVal, setEditObjectifVal] = useState(data.objectifLabel || "");
  const [editBilan, setEditBilan] = useState(false);
  const [editBilanVal, setEditBilanVal] = useState(data.bilan || "");
  const [newVictoire, setNewVictoire] = useState("");

  return (
    <div>
      {/* STATS RAPIDES */}
      <div style={{ display: "flex", gap: 8, marginBottom: 14, flexWrap: "wrap" }}>
        {latest && <div style={{ flex: 1, background: `${color}18`, border: `1px solid ${color}33`, borderRadius: 12, padding: "12px 10px", textAlign: "center", minWidth: 72 }}>
          <div style={{ fontSize: 20, fontWeight: 700, color }}>{latest.weight} kg</div>
          <div style={{ fontSize: 10, color: "#94a3b8", marginTop: 2 }}>Actuel</div>
        </div>}
        {toGoal && <div style={{ flex: 1, background: "#f9731618", border: "1px solid #f9731633", borderRadius: 12, padding: "12px 10px", textAlign: "center", minWidth: 72 }}>
          <div style={{ fontSize: 20, fontWeight: 700, color: "#f97316" }}>-{toGoal} kg</div>
          <div style={{ fontSize: 10, color: "#94a3b8", marginTop: 2 }}>Restant</div>
        </div>}
        {totalLoss && <div style={{ flex: 1, background: "#22c55e18", border: "1px solid #22c55e33", borderRadius: 12, padding: "12px 10px", textAlign: "center", minWidth: 72 }}>
          <div style={{ fontSize: 20, fontWeight: 700, color: "#22c55e" }}>-{totalLoss} kg</div>
          <div style={{ fontSize: 10, color: "#94a3b8", marginTop: 2 }}>Perdus 🎉</div>
        </div>}
        {tendance && <div style={{ flex: 1, background: "#ffffff0a", border: "1px solid #ffffff11", borderRadius: 12, padding: "12px 10px", textAlign: "center", minWidth: 72 }}>
          <div style={{ fontSize: 14, fontWeight: 700, color: tendance.color }}>{tendance.label}</div>
          <div style={{ fontSize: 10, color: "#94a3b8", marginTop: 2 }}>Tendance</div>
        </div>}
      </div>

      {/* OBJECTIF EDITABLE */}
      <div style={{ background: `${color}18`, border: `1px solid ${color}44`, borderRadius: 14, padding: "14px 16px", marginBottom: 14 }}>
        <div style={{ fontSize: 10, letterSpacing: 3, color, textTransform: "uppercase", marginBottom: 8 }}>🎯 Mon objectif</div>
        {editObjectif ? (
          <div style={{ display: "flex", gap: 8 }}>
            <input value={editObjectifVal} onChange={e => setEditObjectifVal(e.target.value)}
              style={{ flex: 1, padding: "9px 12px", background: "#ffffff0a", border: `1px solid ${color}44`, borderRadius: 10, color: "#e2e8f0", fontSize: 13, fontFamily: "Georgia,serif", outline: "none" }} />
            <button onClick={() => { update(d => ({ ...d, objectifLabel: editObjectifVal })); setEditObjectif(false); }}
              style={{ padding: "9px 14px", background: color, border: "none", borderRadius: 10, color: "#fff", fontSize: 13, fontWeight: 700, cursor: "pointer" }}>OK</button>
            <button onClick={() => setEditObjectif(false)}
              style={{ padding: "9px 10px", background: "#ffffff11", border: "none", borderRadius: 10, color: "#94a3b8", cursor: "pointer", fontSize: 16 }}>×</button>
          </div>
        ) : (
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <div style={{ fontWeight: 700, fontSize: 15 }}>{data.objectifLabel || "Définir un objectif..."}</div>
            <button onClick={() => { setEditObjectifVal(data.objectifLabel || ""); setEditObjectif(true); }}
              style={{ background: "none", border: "none", color: "#64748b", cursor: "pointer", fontSize: 16 }}>✏️</button>
          </div>
        )}
        <div style={{ marginTop: 10 }}>
          {editBilan ? (
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              <input value={editBilanVal} onChange={e => setEditBilanVal(e.target.value)}
                style={{ padding: "9px 12px", background: "#ffffff0a", border: `1px solid ${color}44`, borderRadius: 10, color: "#e2e8f0", fontSize: 13, fontFamily: "Georgia,serif", outline: "none" }} />
              <div style={{ display: "flex", gap: 6 }}>
                <button onClick={() => { update(d => ({ ...d, bilan: editBilanVal })); setEditBilan(false); }}
                  style={{ flex: 1, padding: "8px", background: color, border: "none", borderRadius: 10, color: "#fff", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>Enregistrer</button>
                <button onClick={() => { update(d => ({ ...d, bilan: "" })); setEditBilan(false); setEditBilanVal(""); }}
                  style={{ padding: "8px 12px", background: "#ef444422", border: "1px solid #ef444444", borderRadius: 10, color: "#ef4444", cursor: "pointer", fontSize: 12 }}>Supprimer</button>
                <button onClick={() => setEditBilan(false)}
                  style={{ padding: "8px 10px", background: "#ffffff11", border: "none", borderRadius: 10, color: "#94a3b8", cursor: "pointer" }}>×</button>
              </div>
            </div>
          ) : (
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              {data.bilan
                ? <div style={{ flex: 1, fontSize: 12, color: "#94a3b8", fontStyle: "italic" }}>💬 {data.bilan}</div>
                : <div style={{ flex: 1, fontSize: 12, color: "#475569", fontStyle: "italic" }}>+ Ajouter un commentaire...</div>}
              <button onClick={() => { setEditBilanVal(data.bilan || ""); setEditBilan(true); }}
                style={{ background: "none", border: "none", color: "#64748b", cursor: "pointer", fontSize: 14 }}>✏️</button>
            </div>
          )}
        </div>
      </div>

      <StatBar color={color} streak={data.streak} label="jours de suivi consécutifs"
        extra={diff ? `Variation : ${Number(diff) > 0 ? "+" : ""}${diff} kg` : "Lance ton suivi quotidien"}
        progress={latest ? Math.round(((93 - latest.weight) / (93 - data.objectif)) * 100) : 0} />

      <SectionBox color={color}>
        <Lbl>Check-in du jour</Lbl>
        <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
          <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
            <input type="number" value={weight} onChange={e => setWeight(e.target.value)}
              placeholder="Poids (ex: 91.5)" step="0.1" min="50" max="200"
              style={{ ...inp(color), maxWidth: 150 }} />
            <span style={{ color: "#94a3b8" }}>kg</span>
          </div>
          <SliderRow label={`Humeur ${moodE[mood]}`}       value={mood}   set={setMood}   min={1} max={5}  color={color} />
          <SliderRow label={`Sommeil ${sleep}h`}            value={sleep}  set={setSleep}  min={4} max={12} color={color} />
          <SliderRow label={`Énergie ${energyE[energy]}`}   value={energy} set={setEnergy} min={1} max={5}  color={color} />
          <input value={note} onChange={e => setNote(e.target.value)}
            placeholder="Note du jour — repas, sport..." style={inp(color)} />
          <button onClick={addEntry} style={{ ...btn(color), width: "100%" }}>Enregistrer mon check-in</button>
        </div>
      </SectionBox>

      <div style={{ background: "#ffffff06", borderRadius: 12, padding: "12px 16px", marginBottom: 14, borderLeft: `3px solid ${color}` }}>
        <div style={{ fontSize: 10, color, letterSpacing: 2, textTransform: "uppercase", marginBottom: 6 }}>Stratégie alimentaire</div>
        <div style={{ fontSize: 13, color: "#cbd5e1", display: "flex", flexDirection: "column", gap: 4 }}>
          <span>🥗 Midi : protéine + légumes</span>
          <span>🌙 Soir : protéine + légumes, pas de féculents</span>
          <span>💧 1,5L d'eau minimum par jour</span>
          <span>😴 7h de sommeil minimum</span>
        </div>
      </div>

      {/* ── DÉFIS ─────────────────────────────────────── */}
      <div style={{ marginBottom: 4 }}>
        <Lbl>🏆 Mes défis</Lbl>
        {[
          { key: "sucre",      emoji: "🍬", label: "Jours sans sucre ajouté" },
          { key: "grignotage", emoji: "🌙", label: "Jours sans grignotage le soir" },
          { key: "alcool",     emoji: "🍷", label: "Jours sans alcool" },
        ].map(({ key, emoji, label }) => {
          const def = defis[key] || { current: 0, record: 0 };
          return (
            <DefiCard key={key}
              defi={{ ...def, emoji, label }}
              onTenu={() => tenu(key)}
              onReset={() => reset(key)}
              onSetManual={v => setManual(key, v)}
              color={color}
            />
          );
        })}
      </div>

      {entries.length === 0 && <Empty emoji="🌿" text="Commence ton premier check-in !" />}

      {entries.length > 1 && (
        <div style={{ marginBottom: 14 }}>
          <Lbl>Évolution du poids</Lbl>
          <MiniChart entries={[...entries].reverse()} color={color} objectif={data.objectif} />
        </div>
      )}

      {/* JOURNAL */}
      <JournalSection
        journal={data.journal || []}
        onAdd={(type, text) => update(d => ({ ...d, journal: [{ id: Date.now(), type, text, date: today() }, ...(d.journal || [])] }))}
        onDelete={id => update(d => ({ ...d, journal: (d.journal || []).filter(j => j.id !== id) }))}
        onEdit={(id, text) => update(d => ({ ...d, journal: (d.journal || []).map(j => j.id === id ? { ...j, text } : j) }))}
        color={color}
      />

      {/* MES VICTOIRES */}
      <div style={{ marginBottom: 14 }}>
        <Lbl>🏅 Mes victoires</Lbl>

function ChatCoach({ tab, data, history, setHistory, activeColor, onClose, onNeedKey }) {
  const [input, setInput]     = useState("");
  const [loading, setLoading] = useState(false);
  const bottomRef = useRef(null);

  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: "smooth" }); }, [history, loading]);

  const tabNames = {
    procrastination: "anti-procrastination et organisation",

    poids: "bien-être et perte de poids",
  };

  const poids = data.poids.entries;
  const systemPrompt = `Tu es un coach personnel bienveillant, direct et motivant. Tu parles à quelqu'un qui travaille sur 3 axes : ne plus procrastiner, améliorer son anglais (intermédiaire → professionnel), et perdre du poids.

Son contexte (historique de coaching) :
- Organisation : Méthode 1-3-1. Bilan initial : "manque de temps, difficile de tenir le programme". Priorité en cours : dossier acharnement thérapeutique (famille — contexte émotionnel difficile). Pas de système de suivi avant cet outil.
- Poids : Départ 93 kg (S44), actuellement ${poids[0]?.weight || "91.8"} kg, objectif 80 kg. Pratique Aïkido (prépare 2ème Kiyu). Stratégie : protéine + légumes, pas de féculents le soir. Tendance à trop manger le soir.
- Streaks : Focus ${data.procrastination.streak}j / Poids ${data.poids.streak}j.
- Il est à Rotterdam (Pays-Bas). Utilise l'app en continu quand il y pense.

Onglet actif : ${tabNames[tab]}.

Réponds en français. Sois concis (3-5 phrases max sauf question complexe), chaleureux, direct, sans bullshit. Donne des conseils actionnables et spécifiques. Emojis avec parcimonie. Sois personnel — tu le connais.`;

  const send = async () => {
    if (!input.trim() || loading) return;
    const apiKey = getApiKey();
    if (!apiKey) { onNeedKey(); return; }
    const msg  = { role: "user", content: input.trim() };
    const msgs = [...history, msg];
    setHistory(msgs);
    setInput("");
    setLoading(true);
    try {
      const r = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": apiKey,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true",
        },
        body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 1000, system: systemPrompt, messages: msgs }),
      });
      const d   = await r.json();
      const txt = d.content?.[0]?.text || (d.error ? `Erreur API : ${d.error.message}` : "Désolé, erreur.");
      setHistory([...msgs, { role: "assistant", content: txt }]);
    } catch (err) {
      setHistory([...msgs, { role: "assistant", content: `Erreur de connexion : ${err.message}` }]);
    }
    setLoading(false);
  };

  return (
    <div style={{ position: "fixed", inset: 0, background: "#0000009a", zIndex: 200, display: "flex", alignItems: "flex-end", justifyContent: "flex-end", padding: 12 }}>
      <div style={{
        width: "100%", maxWidth: 430, height: "70vh",
        background: "linear-gradient(160deg,#1e293b,#0f172a)",
        borderRadius: 20, border: `1px solid ${activeColor}44`,
        display: "flex", flexDirection: "column",
        boxShadow: `0 0 40px ${activeColor}33`,
      }}>
        <div style={{ padding: "12px 16px", borderBottom: "1px solid #ffffff11", display: "flex", alignItems: "center", gap: 10 }}>
          <div style={{ width: 34, height: 34, borderRadius: 50, background: activeColor, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16 }}>🤖</div>
          <div>
            <div style={{ fontWeight: 700, fontSize: 13 }}>Mon Coach IA</div>
            <div style={{ fontSize: 10, color: "#94a3b8" }}>Connaît ton historique S44 → maintenant</div>
          </div>
          <button onClick={onClose} style={{ marginLeft: "auto", background: "none", border: "none", color: "#64748b", fontSize: 22, cursor: "pointer" }}>×</button>

// ── APP ───────────────────────────────────────────────────────────────────────
function App() {
  const [splash, setSplash]     = useState(true);
  const [tab, setTab]           = useState("poids");
  const [data, setData]         = useState(null);
  const [syncStatus, setSyncStatus] = useState("syncing"); // ok | syncing | error
  const [chatOpen, setChatOpen] = useState(false);
  const [showApiModal, setShowApiModal] = useState(false);
  const saveTimer = useRef(null);

  // Load from Supabase on mount
  useEffect(() => {
    async function load() {
      setSyncStatus("syncing");
      try {
        const { data: rows, error } = await supabase
          .from("coach_data")
          .select("*")
          .eq("id", "main")
          .single();

        const defaults = JSON.parse(JSON.stringify(HISTORICAL_DATA));
        if (error || !rows) {
          // First time: push historical data
          await supabase.from("coach_data").upsert({
            id: "main",
            procrastination: defaults.procrastination,
            anglais: defaults.anglais,
            poids: defaults.poids,
            chat_history: defaults.chatHistory,
            updated_at: new Date().toISOString(),
          });
          setData(defaults);
        } else {
          // Merge with defaults to ensure all keys exist
          const p = rows.procrastination || {};
          const w = rows.poids || {};
          setData({
            procrastination: { ...defaults.procrastination, ...p, tasks: p.tasks || defaults.procrastination.tasks, mantras: p.mantras || defaults.procrastination.mantras },
            poids: { ...defaults.poids, ...w, entries: w.entries || defaults.poids.entries, defis: w.defis || defaults.poids.defis, journal: w.journal || [], victoires: w.victoires || [], objectifLabel: w.objectifLabel || defaults.poids.objectifLabel, bilan: w.bilan || '' },
            chatHistory: rows.chat_history || [],
          });
        }
        setSyncStatus("ok");
      } catch (e) {
        console.error(e);
        setData(JSON.parse(JSON.stringify(HISTORICAL_DATA)));
        setSyncStatus("error");
      }
    }
    load();
  }, []);

  // Save to Supabase with debounce (1.5s)
  useEffect(() => {
    if (!data) return;
    if (saveTimer.current) clearTimeout(saveTimer.current);
    setSyncStatus("syncing");
    saveTimer.current = setTimeout(async () => {
      try {
        await supabase.from("coach_data").upsert({
          id: "main",
          procrastination: data.procrastination,
          poids: data.poids,
          chat_history: data.chatHistory,
          updated_at: new Date().toISOString(),
        });
        setSyncStatus("ok");
      } catch {
        setSyncStatus("error");
      }
    }, 1500);
  }, [data]);

  const update = (key, val) =>
    setData(prev => ({ ...prev, [key]: typeof val === "function" ? val(prev[key]) : val }));

  if (splash) return <SplashScreen onEnter={() => setSplash(false)} />;

  if (!data) {
    return (
      <div style={{ minHeight: "100vh", background: "linear-gradient(135deg,#0f0c29,#1a1a2e)", display: "flex", alignItems: "center", justifyContent: "center", flexDirection: "column", gap: 16 }}>
        <div style={{ fontSize: 40 }}>🤖</div>
        <div style={{ color: "#94a3b8", fontSize: 14 }}>Chargement depuis le cloud…</div>
      </div>
    );
  }

  const activeTab = TABS.find(t => t.id === tab);
  const syncColors = { ok: "#22c55e", syncing: "#f97316", error: "#ef4444" };
  const syncLabels = { ok: "Synchronisé", syncing: "Sync…", error: "Hors ligne" };

  return (
    <div style={{
      minHeight: "100vh", minHeight: "100dvh",
      background: "linear-gradient(135deg,#0f0c29 0%,#1a1a2e 50%,#16213e 100%)",
      fontFamily: "Georgia,'Times New Roman',serif",
      color: "#e2e8f0", display: "flex", flexDirection: "column",
    }}>
      {showApiModal && (
        <ApiKeyModal onSave={() => setShowApiModal(false)} onSkip={() => setShowApiModal(false)} />
      )}

      <header style={{ padding: "16px 20px 0", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <div>
          <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 3 }}>
            <span className={`sync-dot ${syncStatus}`} style={{ background: syncColors[syncStatus] }} />
            <span style={{ fontSize: 9, letterSpacing: 2, color: "#94a3b8", textTransform: "uppercase" }}>
              {syncLabels[syncStatus]} 
            </span>
          </div>
          <h1 style={{
            margin: 0, fontSize: 20, fontWeight: 700,
            background: `linear-gradient(90deg,${activeTab.color},#e2e8f0)`,
            WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent",
          }}>Mon espace de progression</h1>
        </div>
        <button onClick={() => setChatOpen(o => !o)} style={{
          background: activeTab.color, border: "none", borderRadius: 50,
          width: 46, height: 46, fontSize: 20, cursor: "pointer",
          boxShadow: `0 0 18px ${activeTab.color}66`,
        }} title="Mon coach IA">🤖</button>
      </header>

      <nav style={{ display: "flex", gap: 6, padding: "12px 20px 0" }}>
        {TABS.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)} style={{
            flex: 1, padding: "10px 4px",
            border: `2px solid ${tab === t.id ? t.color : "transparent"}`,
            borderRadius: 12, background: tab === t.id ? `${t.color}22` : "#ffffff0a",
            color: tab === t.id ? t.color : "#94a3b8",
            fontFamily: "Georgia,serif", fontSize: 12,
            fontWeight: tab === t.id ? 700 : 400, cursor: "pointer",
          }}>{t.label}</button>
        ))}
      </nav>

      <main style={{ flex: 1, padding: "14px 20px", overflowY: "auto", paddingBottom: 30 }}>
        {tab === "poids"           && <PoidsTab   data={data.poids}           update={v => update("poids", v)}           color={TABS[0].color} />}
        {tab === "procrastination" && <FocusTab   data={data.procrastination} update={v => update("procrastination", v)} color={TABS[1].color} />}
      </main>

      {chatOpen && (
        <ChatCoach tab={tab} data={data}
          history={data.chatHistory} setHistory={h => update("chatHistory", h)}
          activeColor={activeTab.color}
          onClose={() => setChatOpen(false)}
          onNeedKey={() => { setChatOpen(false); setShowApiModal(true); }} />
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
